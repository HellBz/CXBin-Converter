name: Build & Release Tauri App

on:
  push:
    tags:
      - 'v*'            # run on version tags like v1.2.3
  workflow_dispatch:    # allow manual runs

permissions:
  contents: write      # needed to create releases

jobs:
  publish-tauri:
    name: Build Tauri bundles
    permissions:
      contents: write
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'CXBin-Converter ${{ github.ref_name }}'
          releaseBody: 'Automated release for ${{ github.ref_name }}.'
          releaseDraft: false
          prerelease: false
      - name: Upload raw Windows x64 executable
        if: matrix.platform == 'windows-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $exe = "src-tauri/target/release/cxbin-converter.exe"
          $renamed = "src-tauri/target/release/cxbin-converter_${{ github.ref_name }}_x64.exe"
          if (Test-Path $exe) {
            Copy-Item $exe $renamed
            gh release upload ${{ github.ref_name }} $renamed --clobber --repo ${{ github.repository }}
          } else {
            Write-Output "Executable not found: $exe"
          }
